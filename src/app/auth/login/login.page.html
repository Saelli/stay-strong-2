<ion-content class="auth-content">
  <div class="auth-container">

    <div class="auth-logo">
      <div class="logo-mark">
        <ion-icon name="flash-outline"></ion-icon>
      </div>
      <span class="app-name">STAY STRONG</span>
    </div>

    <div class="auth-header">
      <h1>Welcome back</h1>
      <p>Sign in to continue</p>
    </div>

    <div class="auth-form">
      <div class="field-group">
        <label>Email</label>
        <ion-item class="auth-item" lines="none">
          <ion-input
            type="email"
            placeholder="you@example.com"
            [(ngModel)]="email"
            autocomplete="email"
          ></ion-input>
        </ion-item>
      </div>

      <div class="field-group">
        <label>Password</label>
        <ion-item class="auth-item" lines="none">
          <ion-input
            type="password"
            placeholder="••••••••"
            [(ngModel)]="password"
            autocomplete="current-password"
          ></ion-input>
        </ion-item>
      </div>

      <div class="forgot-row">
        <span (click)="goToForgot()">Forgot password?</span>
      </div>

      <ion-text color="danger" *ngIf="error" class="error-msg">
        {{ error }}
      </ion-text>

      <ion-button
        expand="block"
        class="btn-primary"
        (click)="onLogin()"
        [disabled]="loading"
      >
        <ion-spinner *ngIf="loading" name="crescent" slot="start"></ion-spinner>
        {{ loading ? 'Signing in…' : 'Sign in' }}
      </ion-button>

      <div class="divider">
        <span class="line"></span>
        <span class="or-text">or</span>
        <span class="line"></span>
      </div>

      <ion-button expand="block" class="btn-outline">
        Continue with Google
      </ion-button>
    </div>

    <p class="switch-text">
      No account?
      <span class="link" (click)="goToRegister()">Create one</span>
    </p>

  </div>
</ion-content>
