<ion-content class="auth-content">
  <div class="auth-container">

    <div class="back-btn" (click)="goBack()">
      <ion-icon name="arrow-back-outline"></ion-icon>
      <span>Back to login</span>
    </div>

    <div class="lock-icon">
      <ion-icon name="lock-closed-outline"></ion-icon>
    </div>

    <div class="auth-header">
      <h1>Reset password</h1>
      <p>Enter your email and we'll send a reset link</p>
    </div>

    <!-- Success state -->
    <div class="success-card" *ngIf="sent">
      <p>✓ Link sent! Check your inbox — it expires in 30 minutes.</p>
    </div>

    <!-- Form state -->
    <div class="auth-form" *ngIf="!sent">
      <div class="field-group">
        <label>Email address</label>
        <ion-item class="auth-item" lines="none">
          <ion-input
            type="email"
            placeholder="you@example.com"
            [(ngModel)]="email"
            autocomplete="email"
          ></ion-input>
        </ion-item>
      </div>

      <ion-text color="danger" *ngIf="error" class="error-msg">
        {{ error }}
      </ion-text>

      <ion-button
        expand="block"
        class="btn-primary"
        (click)="onSendLink()"
        [disabled]="loading"
      >
        <ion-spinner *ngIf="loading" name="crescent" slot="start"></ion-spinner>
        {{ loading ? 'Sending…' : 'Send reset link' }}
      </ion-button>

      <div class="info-card">
        <p>The reset link expires in 30 minutes. Check your spam folder if you don't see it.</p>
      </div>
    </div>

  </div>
</ion-content>
