<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>Favorites</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="fav-content">

  <!-- Empty state -->
  <div class="empty-state" *ngIf="favorites.length === 0">
    <div class="empty-icon">🤍</div>
    <h3>No favorites yet</h3>
    <p>Tap the heart on any workout to save it here</p>
  </div>

  <!-- Favorites list -->
  <div class="fav-list" *ngIf="favorites.length > 0">
    <div class="fav-item" *ngFor="let v of favorites" (click)="play(v)">

      <div class="fav-thumb" [style.backgroundImage]="'url(' + v.thumbnail + ')'">
        <div class="fav-thumb-overlay"></div>
        <ion-icon name="play-circle" class="fav-play"></ion-icon>
      </div>

      <div class="fav-info">
        <div class="fav-title">{{ v.title }}</div>
        <div class="fav-meta">{{ v.duration }} · {{ v.category }}</div>
        <div class="fav-badge" [class.free]="!v.locked">
          {{ v.locked ? '⭐ Premium' : '✓ Free' }}
        </div>
      </div>

      <!-- Remove button -->
      <button class="remove-btn" type="button" (click)="removeFav($event, v)">
        <ion-icon name="heart"></ion-icon>
      </button>

    </div>
  </div>

</ion-content>
