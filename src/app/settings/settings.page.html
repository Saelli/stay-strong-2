<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/tab4" text=""></ion-back-button>
    </ion-buttons>
    <ion-title>Settings</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="settings-content">
  <div class="settings-wrap">

    <!-- Photo -->
    <div class="photo-section">
      <div class="photo-wrap">
        <img *ngIf="avatarUrl" [src]="avatarUrl" class="photo-img" />
        <div *ngIf="!avatarUrl" class="photo-placeholder">
          <ion-icon name="person-outline"></ion-icon>
        </div>
        <label class="camera-btn">
          <ion-icon name="camera-outline"></ion-icon>
          <input type="file" accept="image/*" (change)="onPhotoSelect($event)" hidden />
        </label>
      </div>
      <div class="photo-hint">Tap to change photo</div>
    </div>

    <!-- Fields -->
    <div class="section-title">Personal Info</div>

    <div class="field-group">
      <label>
        <ion-icon name="person-outline"></ion-icon>
        Name
      </label>
      <input type="text" [(ngModel)]="name" placeholder="Your name" />
    </div>

    <div class="field-group">
      <label>
        <ion-icon name="mail-outline"></ion-icon>
        Email
      </label>
      <input type="email" [(ngModel)]="email" placeholder="your@email.com" />
    </div>

    <div class="field-group">
      <label>
        <ion-icon name="location-outline"></ion-icon>
        Location
      </label>
      <input type="text" [(ngModel)]="location" placeholder="City, Country" />
    </div>

    <button class="save-btn" [class.saved]="saved" (click)="save()">
      {{ saved ? '✓ Saved!' : 'Save Changes' }}
    </button>

  </div>
</ion-content>
